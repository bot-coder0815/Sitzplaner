<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sitzplaner Pro | Full Core Stack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">

    <div id="loader" class="loader-overlay" style="display:none;">
        <div class="spinner"></div>
        <p id="loaderMsg">Verarbeite...</p>
    </div>

    <!-- Desktop Kontextmenü -->
    <div id="tableContextMenu" class="ctx-menu">
        <div class="ctx-item" onclick="startRotation()">🔄 Frei Drehen</div>
        <div class="ctx-item" onclick="duplicateTable()">👯 Duplizieren</div>
        <div class="ctx-item" onclick="resetRotation()">🎯 Rotation nullen</div>
        <hr>
        <div class="ctx-item delete" onclick="deleteTable()">🗑️ Löschen</div>
    </div>
    
    <!-- Mobile Aktionsleiste -->
    <div id="mobileActionBar" class="mobile-action-bar">
        <button onclick="startRotation()">🔄 Drehen</button>
        <button onclick="duplicateTable()">👯 Klonen</button>
        <button onclick="resetRotation()">🎯 0°</button>
        <button onclick="deleteTable()" class="danger">🗑️ Löschen</button>
        <button onclick="deselectAll()" class="close-btn">✕</button>
    </div>

    <header id="mainHeader">
        <div class="logo">Sitzplaner <span>Pro</span></div>
        <div class="h-actions">
            <button class="btn-pres-toggle" onclick="togglePresentationMode()">📺 Präsentieren</button>
            <div class="code-container">
                <span class="tiny-label">CODE</span>
                <input type="text" id="promoInput" placeholder="----">
            </div>
            <div class="dropdown">
                <button class="drop-btn" onclick="toggleDrop(event)">Optionen ▾</button>
                <div id="dropMenu" class="drop-content">
                    <div class="drop-label">ANZEIGE</div>
                    <a onclick="changeTheme()">🌓 Design wechseln</a>
                    <div class="drop-label">PROJEKT</div>
                    <a onclick="saveLocal()">💾 Plan speichern</a>
                    <a onclick="exportJSON()">📤 Export (JSON)</a>
                    <a onclick="triggerImport()">📥 Datei importieren</a>
                    <a onclick="openJsonPasteModal()">📋 Code einfügen (JSON)</a>
                    <hr>
                    <a onclick="clearAll()" class="danger">🗑️ Alles löschen</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Versteckter Datei-Input für den fehlerfreien Import -->
    <input type="file" id="importFile" style="display:none;" accept=".json">

    <!-- Modal für RAW JSON Paste -->
    <div id="jsonPasteModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3>JSON-Code einfügen</h3>
            <textarea id="jsonPasteInput" placeholder="Füge deinen Sitzplan-JSON-Code hier ein..."></textarea>
            <div class="modal-actions">
                <button class="btn-sub" onclick="closeJsonPasteModal()">Abbrechen</button>
                <button class="btn-main" onclick="importRawJson()">Laden</button>
            </div>
        </div>
    </div>

    <main id="mainContainer">
        <div class="ui-panel" id="sidebarPanel">
            <textarea id="nameList" placeholder="Namen hier eingeben (einer pro Zeile)..."></textarea>
            <div class="btn-grid">
                <button class="btn-sub" onclick="addTable('double', false)">+ Tisch (H)</button>
                <button class="btn-sub" onclick="addTable('double', true)">+ Tisch (V)</button>
                <button class="btn-sub" onclick="addTable('pult', false)">👨‍🏫 Pult</button>
                <button class="btn-sub" onclick="addTable('single', false)">👤 Einzel</button>
            </div>
            <button class="btn-main" onclick="runGenerate()">✨ Sitzordnung würfeln</button>
        </div>

        <div id="viewport" class="viewport">
            <!-- Präsentations-Overlays -->
            <div id="presTextOverlay" class="pres-text-container" style="display: none;">
                <input type="text" id="presTitleInput" value="Sitzplan | Made with Pro" placeholder="Hier Titel eingeben...">
            </div>

            <div id="presControls" class="pres-controls" style="display: none;">
                <label class="snap-toggle">
                    <input type="checkbox" id="snapGridCheck" onchange="toggleSnapToGrid(this.checked)">
                    <span>Layout anordnen (Klatschen)</span>
                </label>
                <div class="pres-btn-group">
                    <button class="btn-download-image" onclick="downloadPresImage()">📸 Bild runterladen</button>
                    <button class="btn-exit-pres" onclick="togglePresentationMode()">✕ Beenden</button>
                </div>
            </div>

            <div id="rotIndicator" class="rot-badge">
                <div class="mini-spinner"></div>
                <span>Mausrad drehen | Klick zum Fixieren</span>
            </div>
            
            <div id="canvas" class="canvas">
                <div class="grid-layer"></div>
            </div>
        </div>

        <button class="btn-share" id="shareBtn" onclick="runShare()">
            <span id="shareText">🔗 Link zum Teilen kopieren</span>
            <div id="shareLoader" class="inline-spinner" style="display:none;"></div>
        </button>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
